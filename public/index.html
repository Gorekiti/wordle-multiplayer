<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wordle Duo Rooms</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="auth-screen">
        <div class="auth-box">
            <h1>Wordle Duo</h1>
            <input type="text" id="nick-input" placeholder="Твой ник" maxlength="12">
            <button id="create-room-btn" disabled onclick="createRoom()">Создать комнату</button>
        </div>
    </div>

    <div id="game-ui" class="main-layout hidden">
        <aside class="sidebar">
            <h3>🏆 Лидеры</h3>
            <ul id="leaderboard"></ul>
        </aside>

        <main class="game-area">
            <h2 id="status-msg">Ожидание соперника...</h2>
            <div id="setup-zone" class="hidden">
                <input type="text" id="secret-word" placeholder="Загадай слово (2-10)">
                <button onclick="sendSecret()">Загадать</button>
            </div>
            <div id="grid-zone" class="hidden">
                <div id="grid"></div>
                <input type="text" id="guess-input" placeholder="Твой ответ">
                <button onclick="sendGuess()">OK</button>
            </div>
        </main>

        <aside class="sidebar">
            <h3>👥 Игроки</h3>
            <ul id="player-list"></ul>
            <button id="copy-link-btn" onclick="copyRoomLink()">🔗 Копировать ссылку</button>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
