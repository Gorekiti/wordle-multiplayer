<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub Platform</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="toast-container"></div>

    <div id="auth-screen" class="screen">
        <div class="box main-auth">
            <h1 class="logo-text">Game<span>Hub</span></h1>
            <input type="text" id="nick-input" placeholder="Введите ваш ник...">
            <div class="mode-select">
                <button class="mode-btn wordle" onclick="openLobby('wordle')">Wordle 1x1</button>
                <button class="mode-btn croc" onclick="openLobby('croc')">Крокодил</button>
            </div>
        </div>
    </div>

    <div id="lobby-screen" class="screen hidden">
        <div class="lobby-container">
            <header class="lobby-header">
                <button class="icon-btn" onclick="goHome()">🏠</button>
                <h2 id="lobby-title">Лобби</h2>
                <button class="create-btn" onclick="createRoom()">+ Создать</button>
            </header>
            <div id="rooms-list" class="rooms-grid"></div>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="app-container">
            <aside class="side-panel left">
                <button class="home-btn" onclick="goHome()">🏠 На главную</button>
                <div class="stat-section">
                    <h3>🏆 Рейтинг комнаты</h3>
                    <ul id="leaderboard" class="scroll-list"></ul>
                </div>
            </aside>

            <main class="game-core">
                <div id="timer-display" class="timer-bar">01:20</div>
                <div id="result-display" class="hidden"></div>
                <h2 id="status-msg">Ожидание...</h2>
                
                <div id="wordle-ui" class="hidden game-box">
                    <div id="setup-zone" class="hidden input-group">
                        <input type="text" id="secret-word" placeholder="Загадай слово (2-10)">
                        <button onclick="sendSecret()">Загадать</button>
                    </div>
                    <div id="grid-zone">
                        <div id="grid"></div>
                    </div>
                    <div id="input-wrapper" class="hidden input-group">
                        <input type="text" id="guess-input" placeholder="Твой ответ">
                        <button onclick="sendGuess()">OK</button>
                    </div>
                </div>

                <div id="croc-ui" class="hidden game-box">
                    <div id="word-picker" class="hidden modal">
                        <h3>Выбери слово:</h3>
                        <div id="word-options" class="options-row"></div>
                    </div>
                    <div class="canvas-wrapper">
                        <canvas id="canvas" width="900" height="600"></canvas>
                        
                        <div id="croc-win-screen" class="hidden">
                            <div class="win-content">
                                <h2 id="win-word">СЛОВО</h2>
                                <p class="win-player">🖌️ Рисовал(а): <span id="win-setter"></span></p>
                                <p class="win-player" id="win-guesser-block">🏆 Угадал(а): <span id="win-guesser"></span></p>
                                <div class="win-timer-block">⏱ След. раунд через: <span id="win-timer">5</span></div>
                            </div>
                        </div>

                        <div id="croc-tools" class="toolbar">
                            <div class="palette">
                                <div class="color-swatch active" style="background:#000000" onclick="setColor('#000000', this)"></div>
                                <div class="color-swatch" style="background:#e74c3c" onclick="setColor('#e74c3c', this)"></div>
                                <div class="color-swatch" style="background:#3498db" onclick="setColor('#3498db', this)"></div>
                                <div class="color-swatch" style="background:#2ecc71" onclick="setColor('#2ecc71', this)"></div>
                                <div class="color-swatch" style="background:#f1c40f" onclick="setColor('#f1c40f', this)"></div>
                            </div>
                            <input type="range" id="size-picker" min="1" max="25" value="5">
                            <button class="tool-btn" onclick="setEraser(this)">🧽 Ластик</button>
                            <button class="tool-btn" onclick="clearCanvas()">🗑 Сброс</button>
                        </div>
                    </div>
                </div>
            </main>

            <aside class="side-panel right">
                <div class="players-section">
                    <div class="flex-header">
                        <h3>👥 Игроки</h3>
                        <span id="player-count-badge" class="badge">0/0</span>
                    </div>
                    <ul id="player-list" class="scroll-list player-chips"></ul>
                </div>
                
                <div class="chat-section" id="chat-container">
                    <h3>💬 Чат</h3>
                    <div id="chat-box"></div>
                    <input type="text" id="chat-input" placeholder="Сообщение...">
                </div>

                <button class="invite-btn" onclick="copyRoomLink()">🔗 Копировать ссылку</button>
            </aside>
        </div>
    </div>
    
    <script src="js/socket.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/wordle.js"></script>
    <script src="js/croc.js"></script>
</body>
</html>
